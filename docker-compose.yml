services:
    postgres:
        container_name: postgres
        image: postgres:17
        environment:
            POSTGRES_DB: terrier
            POSTGRES_USER: terrier
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-terrier}
        volumes:
            - postgres_data:/var/lib/postgresql/data
        ports:
            - "5432:5432"
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U terrier"]
            interval: 10s
            timeout: 5s
            retries: 5

    valkey:
        container_name: valkey
        image: valkey/valkey:8-alpine
        ports:
            - "6379:6379"
        volumes:
            - valkey_data:/data
        healthcheck:
            test: ["CMD", "valkey-cli", "ping"]
            interval: 10s
            timeout: 5s
            retries: 5

    minio:
        container_name: minio
        image: minio/minio:latest
        command: server /data --console-address ":9001"
        environment:
            MINIO_ROOT_USER: ${MINIO_ROOT_USER:-terrier}
            MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-terrier}
        volumes:
            - minio_data:/data
        ports:
            - "9000:9000"
            - "9001:9001"
        healthcheck:
            test: ["CMD", "mc", "ready", "local"]
            interval: 10s
            timeout: 5s
            retries: 5

    pgadmin:
        container_name: pgadmin
        image: dpage/pgadmin4:latest
        environment:
            PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@terrier.local}
            PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
            PGADMIN_ALLOW_SPECIAL_EMAIL_DOMAINS: "local"
            PGADMIN_CONFIG_SERVER_MODE: "False"
        volumes:
            - pgadmin_data:/var/lib/pgadmin
        ports:
            - "8081:80"
        depends_on:
            postgres:
                condition: service_healthy
        restart: unless-stopped

volumes:
    postgres_data:
        name: postgres_data
    pgadmin_data:
        name: pgadmin_data
    valkey_data:
        name: valkey_data
    minio_data:
        name: minio_data
