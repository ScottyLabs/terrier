services:
  postgres:
    container_name: postgres
    image: docker.io/library/postgres:17
    networks:
      - terrier-network
    environment:
      POSTGRES_DB: terrier
      POSTGRES_USER: terrier
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-terrier}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U terrier"]
      interval: 10s
      timeout: 5s
      retries: 5

  valkey:
    container_name: valkey
    image: docker.io/valkey/valkey:8-alpine
    networks:
      - terrier-network
    volumes:
      - valkey_data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    container_name: minio
    image: docker.io/minio/minio:latest
    networks:
      - terrier-network
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-terrier}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-terrier}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    container_name: pgadmin
    image: docker.io/dpage/pgadmin4:latest
    networks:
      - terrier-network
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@terrier.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_ALLOW_SPECIAL_EMAIL_DOMAINS: "local"
      PGADMIN_CONFIG_SERVER_MODE: "False"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    ports:
      - "8081:80"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  terrier:
    container_name: terrier
    image: ghcr.io/scottylabs/terrier-production:latest
    networks:
      - terrier-network
    env_file:
      - .env
    environment:
      # App configuration
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:3000}
      # Database
      DATABASE_URL: ${DATABASE_URL:-postgres://terrier:terrier@postgres:5432/terrier}
      # Redis/Valkey
      REDIS_URL: ${REDIS_URL:-redis://valkey:6379}
      # MinIO/S3
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-http://minio:9000}
      MINIO_PUBLIC_ENDPOINT: ${MINIO_PUBLIC_ENDPOINT:-http://localhost:9000}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-terrier}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-terrier}
      MINIO_BUCKET: ${MINIO_BUCKET:-terrier}
      # OIDC (no defaults - must be provided)
      OIDC_ISSUER: ${OIDC_ISSUER}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET}
      # Optional
      ADMIN_EMAILS: ${ADMIN_EMAILS:-}
    ports:
      - "${TERRIER_PORT:-3000}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
      minio:
        condition: service_healthy

networks:
  terrier-network:
    driver: bridge

volumes:
  postgres_data:
    name: postgres_data
  pgadmin_data:
    name: pgadmin_data
  valkey_data:
    name: valkey_data
  minio_data:
    name: minio_data
